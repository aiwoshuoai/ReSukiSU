name: GKI 6.1 全量内核集成构建 (Custom Clang & Patches)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (例如: android14-6.1-lts)'
        required: true
        default: 'android14-6.1-lts'
      extra_kconfig:
        description: '额外的 Kconfig 宏 (每行一个，如 CONFIG_DEBUG_KSU=y)'
        required: false
        type: string
      enable_susfs:
        description: '是否启用 SUSFS (将自动下载并补丁内核)'
        required: false
        default: true
        type: boolean
      susfs_patch_url:
        description: 'SUSFS 补丁下载地址 (留空则使用默认)'
        required: false
        type: string
        default: 'https://gitlab.com/simonpunk/susfs4ksu/-/raw/main/kernel_patches'
      use_bbg:
        description: '是否添加 BBG 防格机补丁'
        required: false
        default: true
        type: boolean
      use_rekernel:
        description: '是否应用 Re-Kernel'
        required: false
        default: true
        type: boolean
      enable_kpm:
        description: '是否启用 KPM (Kernel Patch Module, 不稳定)'
        required: false
        default: false
        type: boolean
      enable_custom_timestamp:
        description: '是否启用自定义编译时间 (默认不勾选则使用当前时间)'
        required: false
        default: false
        type: boolean
      custom_timestamp:
        description: '自定义编译时间 (仅在勾选上方选项时生效，格式: YYYY-MM-DD HH:MM)'
        required: false
        type: string

env:
  KERNEL_ROOT: kernel_tree

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装编译与构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex git gnupg gperf \
            libelf-dev libncurses5-dev libssl-dev python3 python-is-python3 \
            unzip xz-utils zip zlib1g-dev dwarves jq git-lfs

      - name: 检出本仓库 (ReSukiSU)
        uses: actions/checkout@v6
        with:
          path: resukisu

      - name: 验证 ReSukiSU 版本信息
        working-directory: resukisu
        run: |
          RESUKISU_HASH=$(git rev-parse --short HEAD)
          RESUKISU_DATE=$(git log -1 --format='%cd')
          echo "RESUKISU_HASH=$RESUKISU_HASH" >> $GITHUB_ENV
          echo "RESUKISU_DATE=$RESUKISU_DATE" >> $GITHUB_ENV
          echo "================================================="
          echo "✅ ReSukiSU 检出成功！"
          echo "📦 版本 Hash: $RESUKISU_HASH"
          echo "🕒 提交日期: $RESUKISU_DATE"
          echo "================================================="

      - name: 解析自定义提交配置 (Parse Custom Commits)
        id: parse_custom
        working-directory: resukisu
        run: |
          # 读取配置文件
          CONF="custom_commits.conf"
          IS_CUSTOM=$(grep "^custom=" $CONF | cut -d'=' -f2 | tr -d '[:space:]')
          
          if [ "$IS_CUSTOM" = "true" ]; then
            echo "检测到启用自定义提交配置"
            KSU_HASH=$(grep "^resukisu=" $CONF | cut -d'=' -f2 | tr -d '[:space:]')
            GKI_HASH=$(grep "^gki_android14_6_1=" $CONF | cut -d'=' -f2 | tr -d '[:space:]')
            
            if [ -z "$KSU_HASH" ]; then KSU_HASH="HEAD"; fi
            if [ -z "$GKI_HASH" ]; then GKI_HASH="HEAD"; fi
            
            echo "ksu_hash=$KSU_HASH" >> $GITHUB_OUTPUT
            echo "gki_hash=$GKI_HASH" >> $GITHUB_OUTPUT
            echo "IS_ENABLED=true" >> $GITHUB_ENV
          else
            echo "未启用自定义提交，使用默认分支最新代码"
            echo "ksu_hash=HEAD" >> $GITHUB_OUTPUT
            echo "gki_hash=HEAD" >> $GITHUB_OUTPUT
            echo "IS_ENABLED=false" >> $GITHUB_ENV
          fi

      - name: 应用 ReSukiSU 自定义提交
        if: env.IS_ENABLED == 'true'
        working-directory: resukisu
        run: |
          TARGET_HASH="${{ steps.parse_custom.outputs.ksu_hash }}"
          if [ "$TARGET_HASH" != "HEAD" ]; then
            echo "正在切换 ReSukiSU 到提交: $TARGET_HASH"
            git checkout "$TARGET_HASH"
          fi

      - name: 拉取 GKI 源码
        run: |
          # 拉取 GKI 源码
          git clone --depth 50 --branch ${{ github.event.inputs.kernel_version }} https://android.googlesource.com/kernel/common ${{ env.KERNEL_ROOT }}/common
          
          # 如果启用了自定义提交，切换 GKI 版本
          if [ "${{ env.IS_ENABLED }}" = "true" ]; then
            TARGET_GKI_HASH="${{ steps.parse_custom.outputs.gki_hash }}"
            if [ "$TARGET_GKI_HASH" != HEAD ]; then
              echo "正在切换 GKI 源码到提交: $TARGET_GKI_HASH"
              cd ${{ env.KERNEL_ROOT }}/common
              git checkout "$TARGET_GKI_HASH"
              cd -
            fi
          fi

          # 验证 GKI 源码版本
          cd ${{ env.KERNEL_ROOT }}/common
          GKI_HASH=$(git rev-parse --short HEAD)
          GKI_DATE=$(git log -1 --format='%cd')
          echo "GKI_HASH=$GKI_HASH" >> $GITHUB_ENV
          echo "GKI_DATE=$GKI_DATE" >> $GITHUB_ENV
          echo "================================================="
          echo "✅ GKI 源码拉取成功！"
          echo "📦 当前提交 Hash: $GKI_HASH"
          echo "🕒 最新提交日期: $GKI_DATE"
          echo "================================================="
          cd -
          
          # 创建必要的目录结构
          mkdir -p ${{ env.KERNEL_ROOT }}/prebuilts/clang/host/linux-x86/
          mkdir -p ${{ env.KERNEL_ROOT }}/prebuilts/clang/host/linux-x86/clang-old
          touch ${{ env.KERNEL_ROOT }}/prebuilts/clang/host/linux-x86/clang-old/BUILD.bazel

      # ================== 新增：缓存 Clang 压缩包 ==================
      - name: 缓存 Clang 压缩包
        id: cache-clang-tar
        uses: actions/cache@v4
        with:
          path: ~/.clang_cache
          key: clang-r596125-tar-${{ runner.os }}
      # =============================================================

      - name: 升级 Clang 编译器
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          #  目标版本：Clang 22 
          TARGET_CLANG_VER="clang-r596125"

          DEFAULT_CLANG_DIR=$(ls -d prebuilts/clang/host/linux-x86/clang-r* | head -n 1)
          if [ -z "$DEFAULT_CLANG_DIR" ]; then
             DEFAULT_CLANG_DIR="prebuilts/clang/host/linux-x86/clang-old"
          fi
          DEFAULT_CLANG_VER=$(basename "$DEFAULT_CLANG_DIR")

          echo "检测到默认 Clang 版本: $DEFAULT_CLANG_VER"
          echo "准备越级升级到: $TARGET_CLANG_VER"

          if [ "$DEFAULT_CLANG_VER" != "$TARGET_CLANG_VER" ]; then
            CACHE_DIR="$HOME/.clang_cache"
            mkdir -p "$CACHE_DIR"
            TAR_PATH="$CACHE_DIR/${TARGET_CLANG_VER}.tar.gz"

            if [ ! -f "$TAR_PATH" ]; then
              echo "未命中缓存，启动【绝对坐标】强行检出模式..."

              # 核心黑科技：锁定到 Clang 22 合并时的绝对时间线坐标
              COMMIT_HASH="f669caf358c769ff91f7e30abac49f4958f9effc"

              mkdir -p /tmp/clang_pull
              cd /tmp/clang_pull

              echo "1. 正在拉取仓库框架 (开启 Blob 过滤)..."
              git clone --filter=blob:none --sparse https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 .

              echo "2. 锁定到绝对提交点..."
              git checkout $COMMIT_HASH

              echo "3. 精准解压提取 Clang 22 实体..."
              git sparse-checkout set "${TARGET_CLANG_VER}"

              if [ ! -d "${TARGET_CLANG_VER}" ]; then
                echo "❌ 致命错误: 找不到 ${TARGET_CLANG_VER}！"
                exit 1
              fi

              echo "✅ 打包存入缓存中..."
              tar -czf "$TAR_PATH" "${TARGET_CLANG_VER}"
              cd -
            else
              echo "⚡ 命中 GitHub Cache，直接使用缓存的压缩包！"
            fi

            mkdir -p /tmp/new_clang
            cd /tmp/new_clang
            echo "正在解压装配..."
            tar -xzf "$TAR_PATH"

            cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}

            # 备份旧版本并替换核心
            mv "$DEFAULT_CLANG_DIR" "${DEFAULT_CLANG_DIR}_bak"
            mv "/tmp/new_clang/${TARGET_CLANG_VER}" "$DEFAULT_CLANG_DIR"

            echo "正在窃取旧版本 Bazel 通行证..."
            cp "${DEFAULT_CLANG_DIR}_bak/BUILD.bazel" "$DEFAULT_CLANG_DIR/BUILD.bazel" || true
           
            echo " Clang 升级完毕！"
            # "$DEFAULT_CLANG_DIR/bin/clang" --version
          else
            echo "当前已是目标 Clang 版本，无需升级。"
          fi

      - name: 集成 ReSukiSU 源码并注入宏
        run: |
          # 1. 集成源码
          mkdir -p ${{ env.KERNEL_ROOT }}/common/security/resukisu
          cp -r resukisu/kernel/* ${{ env.KERNEL_ROOT }}/common/security/resukisu/
          
          # 2. 修改内核 Kconfig/Makefile
          if ! grep -q "resukisu" ${{ env.KERNEL_ROOT }}/common/security/Kconfig; then
            sed -i '$a source "security/resukisu/Kconfig"' ${{ env.KERNEL_ROOT }}/common/security/Kconfig
          fi
          if ! grep -q "resukisu" ${{ env.KERNEL_ROOT }}/common/security/Makefile; then
            sed -i '$a obj-$(CONFIG_KSU) += resukisu/' ${{ env.KERNEL_ROOT }}/common/security/Makefile
          fi

          # 3. 准备基础配置 (优先使用本仓库预设的 gki_defconfig)
          GKI_DEFCONFIG_PATH="${{ env.KERNEL_ROOT }}/common/arch/arm64/configs/gki_defconfig"
          PRESET_CONFIG="resukisu/kernel/configs/arch/arm64/configs/gki_defconfig"
          
          if [ -f "$PRESET_CONFIG" ]; then
            echo "发现 ReSukiSU 预设配置，正在同步到内核树..."
            cp -f "$PRESET_CONFIG" "$GKI_DEFCONFIG_PATH"
          fi

          # 4. 注入 6.1 专属配置扩展 (Kconfig.ext)
          if [ -f "${{ env.KERNEL_ROOT }}/common/security/resukisu/configs/6.1/Kconfig.ext" ]; then
            echo "正在关联 6.1 专属 Kconfig 扩展..."
            if ! grep -q "Kconfig.ext" ${{ env.KERNEL_ROOT }}/common/security/resukisu/Kconfig; then
              sed -i '$a source "security/resukisu/configs/6.1/Kconfig.ext"' ${{ env.KERNEL_ROOT }}/common/security/resukisu/Kconfig
            fi
          fi

          # 5. 注入自定义宏到 gki_defconfig
          echo "正在注入自定义 Kconfig 宏..."
          echo "${{ github.event.inputs.extra_kconfig }}" >> "$GKI_DEFCONFIG_PATH"
          
          # 6. 处理 KPM 开关
          if [ "${{ github.event.inputs.enable_kpm }}" = "true" ]; then
            echo "正在启用 KPM 功能..."
            echo "CONFIG_KPM=y" >> "$GKI_DEFCONFIG_PATH"
          fi

      - name: 应用主仓库补丁 (DRM Fix)
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          # 1. 获取子版本号
          SUBLEVEL=$(grep "^SUBLEVEL =" Makefile | awk '{print $3}')
          
          # 2. 只有风险版本 (>138) 才应用补丁
          if [[ "$SUBLEVEL" =~ ^[0-9]+$ ]] && [ "$SUBLEVEL" -gt 138 ]; then
              echo "检测到子版本 $SUBLEVEL > 138，正在应用避坑补丁..."
          
              # 指向仓库中的补丁路径
              PATCH_FILE="$GITHUB_WORKSPACE/resukisu/patches/6.1/drm_fix_61138.patch"
          
              if [ -f "$PATCH_FILE" ]; then
                  echo "正在加载补丁: $PATCH_FILE"
                  patch -p1 --forward < "$PATCH_FILE" || echo "⚠️ 补丁部分冲突"
                  echo "✅ DRM 核心已成功回退至 6.1.138 状态！"
              else
                  echo "ℹ️ 提示：未找到补丁文件 $PATCH_FILE，跳过。"
              fi
          else
              echo "ℹ️ 当前子版本 $SUBLEVEL 无需处理 DRM 降级。"
          fi

      - name: 集成 SUSFS (下载并打补丁)
        if: github.event.inputs.enable_susfs == 'true'
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          # 1. 获取版本信息
          VERSION=$(grep "^VERSION =" Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep "^PATCHLEVEL =" Makefile | awk '{print $3}')
          SUBLEVEL=$(grep "^SUBLEVEL =" Makefile | awk '{print $3}')
          KVER="$VERSION.$PATCHLEVEL"
          
          echo "正在为内核 $KVER.$SUBLEVEL 集成 SUSFS..."

          # 2. 验证 SUSFS 仓库最新状态 (使用 GitLab API)
          # 注意：URL 进行了百分号编码 (simonpunk/susfs4ksu -> simonpunk%2Fsusfs4ksu)
          SUSFS_API_URL="https://gitlab.com/api/v4/projects/simonpunk%2Fsusfs4ksu/repository/branches/main"
          SUSFS_INFO=$(curl -s "$SUSFS_API_URL")
          SUSFS_LATEST_COMMIT_DATE=$(echo "$SUSFS_INFO" | jq -r '.commit.committed_date' || echo "未知")
          SUSFS_LATEST_HASH=$(echo "$SUSFS_INFO" | jq -r '.commit.short_id' || echo "未知")
          
          echo "SUSFS_LATEST_COMMIT_DATE=$SUSFS_LATEST_COMMIT_DATE" >> $GITHUB_ENV
          echo "================================================="
          echo "✅ SUSFS 补丁仓库信息："
          echo "📦 最新提交 Hash: $SUSFS_LATEST_HASH"
          echo "🕒 最新提交日期: $SUSFS_LATEST_COMMIT_DATE"
          echo "================================================="
          
          # 3. 确定补丁文件名
          SUSFS_PATCH="v$KVER/susfs_v$KVER-gki.patch"
          
          # 4. 下载核心补丁
          BASE_URL="${{ github.event.inputs.susfs_patch_url }}"
          echo "下载地址: $BASE_URL/$SUSFS_PATCH"
          
          curl -LSs "$BASE_URL/$SUSFS_PATCH" -o susfs.patch || { echo "❌ 下载 SUSFS 补丁失败"; exit 1; }
          
          # 5. 下载核心头文件
          curl -LSs "https://gitlab.com/simonpunk/susfs4ksu/-/raw/main/kernel_patches/include/linux/susfs.h" -o include/linux/susfs.h
          curl -LSs "https://gitlab.com/simonpunk/susfs4ksu/-/raw/main/kernel_patches/fs/susfs.c" -o fs/susfs.c
          
          # 6. 应用补丁
          if [ -f "susfs.patch" ]; then
            patch -p1 --forward < susfs.patch || echo "⚠️ SUSFS 补丁部分冲突或已应用"
          fi

      - name: 应用 Unicode 绕过修复
        if: github.event.inputs.enable_susfs == 'true'
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          # 根据版本选择补丁
          if [[ "${{ github.event.inputs.kernel_version }}" == *"5.10"* ]] || [[ "${{ github.event.inputs.kernel_version }}" == *"5.15"* ]]; then
            PATCH_FILE="$GITHUB_WORKSPACE/resukisu/patches/unicode_bypass_fix_6.1-.patch"
          else
            PATCH_FILE="$GITHUB_WORKSPACE/resukisu/patches/unicode_bypass_fix_6.1+.patch"
          fi
          
          if [ -f "$PATCH_FILE" ]; then
            echo "正在应用 Unicode 绕过修复补丁: $PATCH_FILE"
            patch -p1 --forward < "$PATCH_FILE" || echo "⚠️ 补丁应用失败或已应用"
          else
            echo "ℹ️ 提示：未找到补丁文件 $PATCH_FILE"
          fi

      - name: 添加 BBG 防格机补丁
        if: github.event.inputs.use_bbg == 'true'
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> common/arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' common/security/Kconfig

      - name: 注入移动端专属 Docker 内核配置
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          echo "正在向 gki_defconfig 注入轻量化 Docker 底层支持..."
          GKI_DEFCONFIG="common/arch/arm64/configs/gki_defconfig"
          cat << 'EOF' >> "$GKI_DEFCONFIG"
          
          # 1. Namespaces (保留隔离能力 - 核心)
          CONFIG_NAMESPACES=y
          CONFIG_UTS_NS=y
          CONFIG_IPC_NS=y
          CONFIG_USER_NS=y
          CONFIG_PID_NS=y
          CONFIG_NET_NS=y
          
          # 2. Cgroups (砍掉耗电元凶 MEMCG 和开机拖油瓶 CPUSETS)
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_CPUACCT=y
          # 绝对不要加 CONFIG_MEMCG 和 CONFIG_BLK_CGROUP！
          # 绝对不要加 CONFIG_CPUSETS (与 Android 调度器冲突)
          
          # 3. Storage & IPC (轻量保留，防闪退)
          CONFIG_OVERLAY_FS=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_SYSVIPC=y
          
          # 4. Networking Core (仅保留必需的 NAT 端口映射)
          CONFIG_VETH=y
          CONFIG_BRIDGE=y
          CONFIG_BRIDGE_NETFILTER=y
          CONFIG_NETFILTER=y
          CONFIG_IP_NF_FILTER=y
          CONFIG_IP_NF_NAT=y
          CONFIG_IP_NF_TARGET_MASQUERADE=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          
          # 5. Security (安全沙盒)
          CONFIG_SECCOMP=y
          CONFIG_SECCOMP_FILTER=y
          EOF
          echo "轻量级 Docker 配置注入完成！"

      - name: 应用 Re-Kernel
        if: github.event.inputs.use_rekernel == 'true'
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -e
          echo "Integrating Re-Kernel..."
          TMP_REKERNEL=/tmp/rekernel
          rm -rf "$TMP_REKERNEL"
          
          # 拉取源码
          git clone --depth 1 https://github.com/Sakion-Team/Re-Kernel.git "$TMP_REKERNEL"
          
          REKERNEL_HASH=$(git -C "$TMP_REKERNEL" rev-parse --short HEAD)
          REKERNEL_DATE=$(git -C "$TMP_REKERNEL" log -1 --date=format:'%Y-%m-%d %H:%M:%S' --format='%cd')
          
          echo "================================================="
          echo "✅ Re-Kernel 源码拉取成功！"
          echo "📦 注入版本 Hash: $REKERNEL_HASH"
          echo "🕒 上游提交时间: $REKERNEL_DATE"
          echo "================================================="
          
          echo "REKERNEL_HASH=$REKERNEL_HASH" >> $GITHUB_ENV
          echo "REKERNEL_DATE=$REKERNEL_DATE" >> $GITHUB_ENV
          
          # 准备驱动源码
          mkdir -p common/drivers/rekernel
          cp "$TMP_REKERNEL/LKM-Source/rekernel.c" common/drivers/rekernel/
          cp "$TMP_REKERNEL/LKM-Source/rekernel.h" common/drivers/rekernel/
          
          # 生成构建配置
          cat > common/drivers/rekernel/Kconfig << 'EOF'
          menu "Re:Kernel"
          config REKERNEL
              bool "Re:Kernel support (GKI Vendor Hooks)"
              default y
              help
                Enable Re-Kernel support via GKI Vendor Hooks.
          
          config REKERNEL_NETWORK
              bool "Re:Kernel NetReceive unfreeze support"
              depends on REKERNEL
              default n
          endmenu
          EOF
          
          cat > common/drivers/rekernel/Makefile << 'EOF'
          obj-$(CONFIG_REKERNEL) += rekernel.o
          ccflags-$(CONFIG_REKERNEL_NETWORK) += -DNETWORK_FILTER
          EOF
          
          # 挂载到驱动树
          if ! grep -qF 'source "drivers/rekernel/Kconfig"' common/drivers/Kconfig; then
            sed -i '/^endmenu$/i source "drivers/rekernel/Kconfig"' common/drivers/Kconfig
          fi
          if ! grep -qF 'obj-$(CONFIG_REKERNEL) += rekernel/' common/drivers/Makefile; then
            echo 'obj-$(CONFIG_REKERNEL) += rekernel/' >> common/drivers/Makefile
          fi
          
          # 启用内核版本宏
          REKERNEL_H="common/drivers/rekernel/rekernel.h"
          # 注意：此处 inputs.kernel_version 可能包含 android14-6.1-lts 等字符串
          # 我们尝试提取版本号部分
          VERSION_NUM=$(echo "${{ github.event.inputs.kernel_version }}" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          VERSION_MACRO="KERNEL_$(echo "$VERSION_NUM" | tr '.' '_')"
          if grep -q "^// #define ${VERSION_MACRO}$" "$REKERNEL_H"; then
            sed -i "s|^// #define ${VERSION_MACRO}$|#define ${VERSION_MACRO}|" "$REKERNEL_H"
          fi
          
          # 修正头文件包含路径（适配 in-tree 编译）
          sed -i 's|#include <../android/binder_internal.h>|#include "../../drivers/android/binder_internal.h"|g' common/drivers/rekernel/rekernel.c
          # 补齐 binder_internal 依赖（避免 5.10 下 DEFINE_SHOW_ATTRIBUTE 报错）
          grep -qF '#include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c || sed -i '/#include <trace\/hooks\/signal.h>/a #include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c
          
          # 配置 defconfig（幂等）
          DEFCONFIG="common/arch/arm64/configs/gki_defconfig"
          grep -q '^CONFIG_REKERNEL=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL=y" >> "$DEFCONFIG"
          grep -q '^CONFIG_REKERNEL_NETWORK=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL_NETWORK=y" >> "$DEFCONFIG"

      - name: 设置编译时间 (Custom Timestamp)
        run: |
          if [ "${{ github.event.inputs.enable_custom_timestamp }}" = "true" ] && [ -n "${{ github.event.inputs.custom_timestamp }}" ]; then
            K_TIME="${{ github.event.inputs.custom_timestamp }}"
            echo "状态: 已启用自定义编译时间"
          else
            K_TIME=$(date "+%Y-%m-%d %H:%M")
            echo "状态: 使用当前系统时间"
          fi
          echo "编译时间将被设置为: $K_TIME"
          echo "KBUILD_BUILD_TIMESTAMP=$K_TIME" >> $GITHUB_ENV
          # 注入到内核版本信息中
          echo "export KBUILD_BUILD_TIMESTAMP=\"$K_TIME\"" >> ${{ env.KERNEL_ROOT }}/common/.config || true

      - name: 开始全量编译
        env:
          KBUILD_BUILD_TIMESTAMP: ${{ env.KBUILD_BUILD_TIMESTAMP }}
        run: |
          echo "使用时间戳: $KBUILD_BUILD_TIMESTAMP 进行编译..."
          # 此处为您的编译指令示例
          # BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

      - name: 收集补丁冲突文件
        if: always()
        run: |
          REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
          mkdir -p "$REJECTS_DIR"

          mapfile -t REJS < <(find "${{ env.KERNEL_ROOT }}" -type f -name '*.rej')
          REJ_COUNT=${#REJS[@]}
          echo "发现 $REJ_COUNT 个 .rej 文件"
          echo "REJ_COUNT=$REJ_COUNT" >> $GITHUB_ENV

          if [ "$REJ_COUNT" -gt 0 ]; then
            for REJ in "${REJS[@]}"; do
              REL="${REJ#${{ env.KERNEL_ROOT }}/}"
              DEST="$REJECTS_DIR/$REL"
              mkdir -p "$(dirname "$DEST")"
              cp "$REJ" "$DEST"

              ORIG="${REJ%.rej}"
              if [ -f "$ORIG" ]; then
                cp "$ORIG" "${DEST%.rej}"
              fi
              echo "$REL" >> "$REJECTS_DIR/index.txt"
            done
          fi

      - name: 上传补丁冲突文件
        if: always() && env.REJ_COUNT != '0'
        uses: actions/upload-artifact@v4
        with:
          name: Patch-Rejects-${{ github.event.inputs.kernel_version }}
          path: patch-rejects/
          if-no-files-found: ignore
          compression-level: 9

      - name: 打包 AnyKernel3 (AK3)
        if: success()
        run: |
          echo "正在准备 AnyKernel3 打包..."
          # 拉取 AK3 模板
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git ak3
          rm -rf ak3/.git
          
          # 查找内核镜像 (Image.gz 或 Image)
          # 注意：路径需根据您的实际编译输出调整
          OUT_DIR="${{ env.KERNEL_ROOT }}/out/android14-6.1/dist"
          if [ -f "$OUT_DIR/Image" ]; then
            cp "$OUT_DIR/Image" ak3/
          elif [ -f "$OUT_DIR/Image.gz" ]; then
            cp "$OUT_DIR/Image.gz" ak3/
          fi
          
          # 查找所有的 .ko 模块
          find "$OUT_DIR" -name "*.ko" -exec cp {} ak3/modules/system/lib/modules/ \; 2>/dev/null || true
          
          # 打包
          cd ak3
          zip -r9 ../AnyKernel3-${{ github.event.inputs.kernel_version }}.zip * -x .gitignore README.md
          cd ..
          echo "AK3 打包完成！"

      - name: 上传 AnyKernel3 产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-${{ github.event.inputs.kernel_version }}
          path: AnyKernel3-*.zip
          compression-level: 9
