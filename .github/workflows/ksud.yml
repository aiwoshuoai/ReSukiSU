name: 构建 ksud
on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      os:
        required: false
        type: string
        default: ubuntu-latest
      pack_lkm:
        required: false
        type: boolean
        default: true
      pack_ksuinit:
        required: false
        type: boolean
        default: true
      use_cache:
        required: false
        type: boolean
        default: true
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 下载产物 (Download artifacts)
      uses: actions/download-artifact@v8
    
    - name: 准备 LKM 文件 (Prepare LKM files)
      if: ${{ inputs.pack_lkm }}
      run: |
        cp android*-lkm/*_kernelsu.ko ./userspace/ksud/bin/aarch64/
    
    - name: 准备 ksuinit (Prepare ksuinit)
      if: ${{ inputs.pack_ksuinit }}
      run: |
        mv ksuinit/*/release/ksuinit ./userspace/ksud/bin/aarch64/
     
    - name: 设置 Rust 工具链 (Setup Rust toolchain)
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: nightly
        targets: ${{ inputs.target }}
        components: rust-src
        
    - uses: Swatinem/rust-cache@v2
      if: github.event_name != 'pull_request'
      with:
        prefix-key: ksud-${{ inputs.target }}-rust
        workspaces: userspace/ksud
        
    - name: 设置 cargo-ndk (Setup cargo-ndk)
      run: cargo install cargo-ndk --locked
        
    - name: 构建 ksud (Build ksud)
      run: |
        cd userspace/ksud/
        cargo ndk b -t ${{ inputs.target }} -r -Z build-std=std,core,panic_abort -Z build-std-features="optimize_for_size" -Z trim-paths

    - name: 上传 ksud 产物 (Upload ksud artifact)
      uses: actions/upload-artifact@v7
      with:
        name: ksud-${{ inputs.target }}
        path: userspace/ksud/target/**/release/ksud*
