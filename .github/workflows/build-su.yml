name: 构建 SU
on:
  push:
    branches: [ "main", "ci" ]
    paths:
      - '.github/workflows/build-su.yml'
      - 'userspace/su/**'
      - 'scripts/ksubot.py'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'userspace/su/**'
jobs:
  build-su:
    name: 构建用户态 SU (Build userspace su)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: 设置是否需要上传 (Setup need_upload)
      id: need_upload
      run: |
        if [ ! -z "${{ secrets.BOT_TOKEN }}" ]; then
          echo "UPLOAD=true" >> $GITHUB_OUTPUT
        else
          echo "UPLOAD=false" >> $GITHUB_OUTPUT
        fi
    - name: 构建 su (Build su)
      working-directory: ./userspace/su
      run: $ANDROID_NDK/ndk-build
    - name: 上传构建产物 (Upload a Build Artifact)
      uses: actions/upload-artifact@v7
      with:
        name: su
        path: ./userspace/su/libs
