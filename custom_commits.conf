# ==================== 自定义提交配置 ====================
# 本文件用于配置 GKI 内核源码和 ReSukiSU 仓库的自定义提交
#
# 使用说明:
#   1. 将 custom 设为 true 启用自定义提交功能
#   2. 在对应配置项后填入想要使用的 commit hash
#   3. 留空表示使用该分支的最新提交
#
# ================================================================

# 是否启用自定义提交 (true/false)
custom=false

# ==================== 提交哈希配置 (Commit Hash) ====================
# 格式: 变量名=哈希值

# GKI 6.1 内核源码提交 (android14-6.1-lts 等分支)
gki_android14_6_1=

# ReSukiSU 仓库提交
resukisu=
